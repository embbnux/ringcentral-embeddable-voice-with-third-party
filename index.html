<!DOCTYPE html>
<html>
<body>
<script>
  // Add widget
  (function() {
    var rcs = document.createElement("script");
    rcs.src = "https://apps.ringcentral.com/integration/ringcentral-embeddable/latest/adapter.js";
    var rcs0 = document.getElementsByTagName("script")[0];
    rcs0.parentNode.insertBefore(rcs, rcs0);
  })();
</script>
<script>
  console.log("[RingCentral App] Override is active!");
  function registerService() {
    document.getElementsByTagName("iframe")[0].contentWindow.postMessage({
      type: 'rc-adapter-register-third-party-service',
      service: {
        name: 'TestService',
        conferenceInvitePath: '/conference/invite',
        conferenceInviteTitle: 'Invite with TestService',
        contactsPath: '/contacts',
        contactSearchPath: '/contacts/search',
        contactMatchPath: '/contacts/match',
        activitiesPath: '/activities',
        activityPath: '/activity',
        callLoggerPath: '/callLogger',
        callLoggerTitle: 'Log to TestService',
        callLogEntityMatcherPath: "/callLogger/match",
        recordingWithToken: 1,
      }
    }, '*');
  }

  // Function to response message to widget
  function responseMessage(request, response) {
    console.log(request);
    document.getElementsByTagName("iframe")[0].contentWindow.postMessage({
      type: 'rc-post-message-response',
      responseId: request.requestId,
      response,
    }, '*');
  }

  function inviteConference(request) {
    responseMessage(request, { data: 'ok' });
  }

  function getContacts(request) {
    responseMessage(request, {
      data: [{
        id: '123456',
        name: 'TestService Name',
        type: 'TestService',
        phoneNumbers: [{
          phoneNumber: '+16579991394',
          phoneType: 'directPhone',
        }]
      }]
    });
  }

  function searchContacts(request) {
    responseMessage(request, {
      data: [{
        id: '123456',
        name: 'TestService Name',
        type: 'TestService Name',
        phoneNumbers: [{
          phoneNumber: '+16579991394',
          phoneType: 'directPhone',
        }]
      }]
    });
  }

  function matchContacts(request) {
    responseMessage(request, {
      data: {
        '+12165325078': [
          {
            entityType: 'TestService',
            name: 'TestService 1',
            phoneNumbers: [{
              phoneNumber: '+12165325078',
              phoneType: 'directPhone',
            }]
          }
        ]
      }
    });
  }

  function getActivities(request) {
    responseMessage(request, {
      data: [{
        id: '123',
        subject: 'Title',
        time: 1528854702472
      }]
    });
  }

  function getActivity(request) {
    responseMessage(request, { data: 'ok' });
  }

  function logCall(request) {
    // Log call event here
    console.log('Log call event', request);
    // Get trigger type: data.body.triggerType
    // When user click log button in call item, triggerType is 'createLog' or 'editLog'
    // When it is triggered from auto log, triggerType is 'presenceUpdate'
    // When save button clicked, triggerType is 'logForm'
    if (request.body.triggerType === 'createLog' || request.body.triggerType === 'editLog') {
      // customize call log page
      document.querySelector("#rc-widget-adapter-frame").contentWindow.postMessage({
        type: 'rc-adapter-update-call-log-page',
        page: {
          title: 'Log to TestService',
          // schema and uiSchema are used to customize call log page, api is the same as [jsonschema-page](https://ringcentral.github.io/ringcentral-embeddable/jsonschema-page/?path=/docs/readme--docs)
          schema: {
            type: 'object',
            required: ['contact', 'activityTitle'],
            properties: {
              "warning": {
                "type": "string",
                "description": "No contact found. Enter a name to have a placeholder contact made for you.",
              },
              "contact": {
                "title": "Contact",
                "type": "string",
                "oneOf": [
                  {
                    "const": "xxx",
                    "title": "John Doe",
                    "description": "Candidate - 347",
                  },
                  {
                    "const": "newEntity",
                    "title": "Create placeholder contact"
                  }
                ],
              },
              "contactName": {
                "type": 'string',
                "title": "Contact name",
              },
              "contactType": {
                "title": "Contact type",
                "type": "string",
                "oneOf": [
                  {
                    "const": "candidate",
                    "title": "Candidate"
                  },
                  {
                    "const": "contact",
                    "title": "Contact"
                  }
                ],
              },
              "activityTitle": {
                "type": "string",
                "title": "Activity title"
              },
              "note": {
                "type": "string",
                "title": "Note"
              },
            },
          },
          uiSchema: {
            warning: {
              "ui:field": "admonition", // or typography to show raw text
              "ui:severity": "warning", // "warning", "info", "error", "success"
            },
            contactName: {
              "ui:placeholder": 'Enter name',
              "ui:widget": "hidden", // remove this line to show contactName input
            },
            contactType: {
              "ui:placeholder": 'Select contact type',
              "ui:widget": "hidden", // remove this line to show contactType input
            },
            note: {
              "ui:placeholder": 'Enter note',
              "ui:widget": "textarea", // show note input as textarea
            },
            submitButtonOptions: {
              submitText: 'Save',
            },
          },
          formData: {
            contact: 'xxx',
            contactName: '',
            contactType: '',
            activityTitle: 'Outbound call to ...',
            note: '',
          },
        },
      }, '*');
      // navigate to call log page
      document.querySelector("#rc-widget-adapter-frame").contentWindow.postMessage({
        type: 'rc-adapter-navigate-to',
        path: `/log/call/${request.body.call.sessionId}`,
      }, '*');
    }
    if (request.body.triggerType === 'logForm' || request.body.triggerType === 'presenceUpdate') {
      // Save call log to your platform
      console.log('Log call to your platform', request.body); // request.body.call, request.body.formData
    }
    responseMessage(request, { data: 'ok' });
  }

  function matchCallLog(request) {
    console.log('Match call log');
    let payload = {};

    if (request && request.body && request.body.sessionIds) {
      request.body.sessionIds.forEach(sessionId => {
        let items = [{
          id: sessionId,
          note: "some note",
        }];
        payload[sessionId] = items;
      });
    }

    responseMessage(request, { data: payload });
  }

  // Add message event to response to the widget
  window.addEventListener('message', function (e) {
    console.log("[RingCentral App] Received post message:", e.data);
    var data = e.data;
    if (data && data.type === 'rc-post-message-request') {
      if (data.path === '/contacts') {
        getContacts(data);
      }
      if (data.path === '/activities') {
        getActivities(data)
      }
      if (data.path === '/activity') {
        getActivity(data);
      }
      if (data.path === '/contacts/search') {
        searchContacts(data);
      }
      if (data.path === '/contacts/match') {
        matchContacts(data);
      }
      if (data.path === '/conference/invite') {
        inviteConference(data);
      }
      if (data.path === '/callLogger') {
        logCall(data);
      }
      if (data.path === '/callLogger/match') {
        matchCallLog(data);
      }
    }
  });

  // To register the widget when it is ready.
  var registered = false;
  window.addEventListener('message', function (e) {
    const data = e.data;
    if (data && data.type === 'rc-adapter-pushAdapterState' && registered === false) {
      registered = true;
      registerService();
    }
  })
</script>
</body>
</html>
